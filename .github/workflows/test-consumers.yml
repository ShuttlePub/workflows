name: Test consumers

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  stellar-detect:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/detect-workspaces.yml
    with:
      target-repository: ShuttlePub/Stellar
      target-ref: main

  stellar-check:
    needs: [stellar-detect]
    uses: ./.github/workflows/check.yml
    with:
      workspace: ${{ needs.stellar-detect.outputs.matrix }}
      target-repository: ShuttlePub/Stellar
      target-ref: main

  emumet-check:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/check.yml
    with:
      workspace: '[ "kernel", "adapter", "application", "server" ]'
      target-repository: ShuttlePub/Emumet
      target-ref: main

  emumet-test-psql:
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/test-psql.yml
    with:
      workspace: driver
      target-repository: ShuttlePub/Emumet
      target-ref: main
