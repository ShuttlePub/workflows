name: Check
on:
  workflow_call:
    inputs:
      workspace:
        type: string
        required: true
      target-repository:
        description: "Repository to checkout for running checks (default: caller repository)"
        type: string
        required: false
        default: ""
      target-ref:
        description: "Ref of target-repository to checkout (default: caller ref)"
        type: string
        required: false
        default: ""
permissions:
  contents: read
jobs:
  read-toolchain:
    uses: ./.github/workflows/read-toolchain.yml
    with:
      target-repository: ${{ inputs.target-repository }}
      target-ref: ${{ inputs.target-ref }}
  check-psql:
    name: Check ${{ inputs.workspace }} with PostgreSQL
    needs: [read-toolchain]
    services:
      postgres:
        image: postgres:16@sha256:caf97593511b021d7eb1d2988971ec1728a2d276f016ad97b587a9d336d07d69 # postgres 16.13
        env:
          POSTGRES_DB: postgres_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    runs-on: ubuntu-latest
    env:
      WORKSPACE: ${{ inputs.workspace }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: ${{ needs.read-toolchain.outputs.channel }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ inputs.workspace }}
      - name: Format check
        run: cargo fmt --verbose -p $WORKSPACE -- --check
      - name: Clippy
        run: cargo clippy --verbose -p "$WORKSPACE" --all-targets -- -D warnings
      - name: Build
        run: cargo build --verbose -p $WORKSPACE
      - name: Test
        run: cargo test --verbose -p $WORKSPACE
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres_test
