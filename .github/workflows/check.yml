name: Check

on:
  workflow_call:
    inputs:
      workspace:
        type: string
        required: true
      target-repository:
        description: "Repository to checkout for running checks (default: caller repository)"
        type: string
        required: false
        default: ""
      target-ref:
        description: "Ref of target-repository to checkout (default: caller ref)"
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  read-toolchain:
    uses: ./.github/workflows/read-toolchain.yml
    with:
      target-repository: ${{ inputs.target-repository }}
      target-ref: ${{ inputs.target-ref }}

  check:
    needs: [read-toolchain]
    runs-on: ubuntu-latest
    strategy:
        fail-fast: false
        matrix:
          workspace: ${{ fromJson(inputs.workspace) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: ${{ needs.read-toolchain.outputs.channel }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ matrix.workspace }}
      - name: Format check
        run: cargo fmt --verbose -p $WORKSPACE -- --check
        env:
          WORKSPACE: ${{ matrix.workspace }}
      - name: Clippy
        run: cargo clippy --verbose -p "$WORKSPACE" --all-targets -- -D warnings
        env:
          WORKSPACE: ${{ matrix.workspace }}
      - name: Build
        run: cargo build --verbose -p $WORKSPACE
        env:
          WORKSPACE: ${{ matrix.workspace }}
      - name: Test
        run: cargo test --verbose -p $WORKSPACE
        env:
          WORKSPACE: ${{ matrix.workspace }}
