name: DetectWorkspaces
on:
  workflow_call:
    inputs:
      target-repository:
        description: "Repository to checkout for detection (default: caller repository)"
        type: string
        required: false
        default: ""
      target-ref:
        description: "Ref of target-repository to checkout (default: caller ref)"
        type: string
        required: false
        default: ""
    outputs:
      matrix:
        description: "Detected workspaces for using matrix"
        value: ${{ jobs.detect-workspaces.outputs.matrix }}
permissions:
  contents: read
jobs:
  detect-workspaces:
    name: Detect workspaces
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'ShuttlePub' && !contains(github.event.head_commit.message, '[CI-SKIP]') }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ inputs.target-repository }}
          ref: ${{ inputs.target-ref }}
          persist-credentials: false
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3.4.0
        with:
          crate: cargo-workspaces
      - id: set-matrix
        run: |
          # outputs like ["kernel","driver"]
          WORKSPACES=$(echo "[$(cargo ws ls)]" | tr '\n' ',\t' | sed -e 's/],/\"]\n/' | sed -e 's/\[/\[\"/' | sed -e 's/,/\",\"/g')
          echo "result: $WORKSPACES"
          echo "matrix=$WORKSPACES" >> "$GITHUB_OUTPUT"
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
